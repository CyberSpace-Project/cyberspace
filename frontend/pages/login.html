<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CyberSpace NIS2</title>

    <!-- Design System: gemeinsame Variablen, Farben, Buttons, Alerts -->
    <link rel="stylesheet" href="../css/design-system.css">

    <!-- Login-spezifische Styles (Header-Farbe, Card-Layout) -->
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <!-- Header -->
            <div class="login-card__header">
                <h1 class="login-card__title">Login</h1>
            </div>

            <div class="login-card__body">

                <!-- Fehlermeldungen (SCRUM-65) -->
                <div id="alertError" class="alert alert--danger" role="alert">
                    <span id="alertErrorText">E-Mail oder Passwort falsch.</span>
                </div>

                <div id="alertLocked" class="alert alert--danger" role="alert">
                    <span id="alertLockedText">
                        Zu viele Fehlversuche. Konto gesperrt für
                        <span id="lockTimer">5:00</span> Minuten.
                    </span>
                </div>

                <div id="alertSuccess" class="alert alert--success" role="alert">
                    Anmeldung erfolgreich! Sie werden weitergeleitet...
                </div>

                <!-- Formular -->
                <form id="loginForm" novalidate>

                    <!-- E-Mail -->
                    <div class="form-group">
                        <label for="email">E-Mail *</label>
                        <input type="email" id="email" name="email"
                               class="form-control"
                               placeholder="beispiel@example.com"
                               required
                               autocomplete="email">
                        <div class="invalid-feedback" id="emailError">
                            Bitte geben Sie eine gültige E-Mail-Adresse ein.
                        </div>
                    </div>

                    <!-- Passwort -->
                    <div class="form-group">
                        <label for="passwort">Passwort *</label>
                        <input type="password" id="passwort" name="passwort"
                               class="form-control"
                               placeholder="••••••••"
                               required
                               autocomplete="current-password">
                        <div class="invalid-feedback" id="passwortError">
                            Bitte geben Sie Ihr Passwort ein.
                        </div>
                    </div>

                    <!-- Angemeldet bleiben -->
                    <div class="form-check">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe">Angemeldet bleiben</label>
                    </div>

                    <!-- Absenden -->
                    <button type="submit" class="btn btn--blue btn--center" id="submitBtn">
                        Anmelden
                    </button>

                </form>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <a href="register.html">Noch nicht registriert? → Registrierung</a>
            </div>

        </div>
    </div>

    <!-- Gemeinsame Validierungsfunktionen (validateEmail, apiRequest, ...) -->
    <script src="../js/validation.js"></script>

    <!-- Login-Logik (Sperre, Weiterleitung, Submit) -->
    <script src="../js/login.js"></script>

</body>
</html>
